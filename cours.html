<script>
/* ============================================================
   MOTEUR DE COURS — les données des leçons sont dans LESSONS
   Types de sections :
   html      : contenu de leçon (théorie)
   code      : playground exécutable (mode: web | leaflet | js)

   tp        : travaux pratiques avec checklist
   ============================================================ */
const MODULES = [];
function mod(titre){ const m={titre,lecons:[]}; MODULES.push(m); return m; }
function lec(m, id, titre, sections){ m.lecons.push({id,titre,sections}); }

/* ---------- MODULE 0 : Comprendre le WebGIS ---------- */
const M0 = mod("0 · Comprendre le WebGIS");
lec(M0,"m0l1","Architecture d'une application WebGIS",[
{t:'html',c:`
<p>Un <b>WebGIS</b> (SIG Web) est une application cartographique qui fonctionne dans le navigateur. Contrairement à un SIG bureautique comme QGIS, tout passe par le web : les données, les traitements et l'affichage.</p>
<h3>Les 4 briques d'un WebGIS full stack</h3>
<ul>
<li><b>Le frontend (client)</b> — la page web vue par l'utilisateur : HTML pour la structure, CSS pour le style, JavaScript + <b>Leaflet</b> pour la carte interactive.</li>
<li><b>Le backend (serveur applicatif)</b> — un programme <b>Node.js/Express</b> qui reçoit les requêtes HTTP et renvoie des données (souvent du GeoJSON).</li>
<li><b>La base de données spatiale</b> — <b>PostgreSQL + PostGIS</b> stocke les géométries (points, lignes, polygones) et permet des requêtes spatiales (distance, intersection…).</li>
<li><b>Le serveur cartographique</b> — <b>GeoServer</b> publie les couches de la base sous forme de services standards <b>WMS</b> et <b>WFS</b>.</li>
</ul>
<div class="note">💡 Le trajet d'une donnée : PostGIS → (GeoServer ou API Node) → réseau (HTTP) → Leaflet qui l'affiche sur la carte.</div>
<h3>WMS vs WFS : la différence clé</h3>
<p><b>WMS</b> (Web Map Service) renvoie des <b>images</b> de carte déjà dessinées par le serveur. Léger pour le navigateur, mais non interactif à l'échelle de l'objet.</p>
<p><b>WFS</b> (Web Feature Service) renvoie les <b>objets vecteurs</b> eux-mêmes (souvent en GeoJSON) avec leurs attributs. Le navigateur peut alors les styliser, les filtrer, réagir au clic sur chaque objet.</p>
<pre><code>Analogie : WMS = une photo du plat  |  WFS = la recette + les ingrédients</code></pre>
<p>Ces deux protocoles sont des standards de l'<b>OGC</b> (Open Geospatial Consortium) : n'importe quel client peut consommer les services de n'importe quel serveur qui les respecte.</p>
`},
{t:'quiz',qs:[
{q:"Quel composant stocke les géométries et permet les requêtes spatiales ?",opts:["Leaflet","GeoServer","PostgreSQL + PostGIS","Express"],a:2,exp:"PostGIS est l'extension spatiale de PostgreSQL : c'est la base de données spatiale."},
{q:"Un service WMS renvoie…",opts:["des objets vecteurs avec attributs","des images de carte dessinées par le serveur","du code JavaScript","des fichiers shapefile"],a:1,exp:"WMS = images (raster). WFS = vecteurs + attributs."},
{q:"Quel outil publie des couches PostGIS en WMS/WFS ?",opts:["Node.js","GeoServer","VS Code","npm"],a:1,exp:"GeoServer est le serveur cartographique open source de la pile."},
{q:"Dans la pile du cours, le backend est écrit avec…",opts:["PHP","Python/Django","Node.js + Express","Java"],a:2,exp:"Node.js permet d'écrire le serveur en JavaScript, avec le framework Express."}
]}
]);

/* ---------- MODULE 1 : HTML & CSS ---------- */
const M1 = mod("1 · HTML & CSS");
lec(M1,"m1l1","Structure d'une page et sélecteurs CSS",[
{t:'html',c:`
<p>Une page web est un document <b>HTML</b> : des balises qui décrivent la structure. Le <b>CSS</b> décrit l'apparence. Ta future application cartographique n'est rien d'autre qu'une page HTML avec une grande <code>&lt;div&gt;</code> pour la carte.</p>
<h3>Le squelette minimal</h3>
<pre><code>&lt;!DOCTYPE html&gt;
&lt;html lang="fr"&gt;
&lt;head&gt;
  &lt;meta charset="UTF-8"&gt;
  &lt;title&gt;Ma page&lt;/title&gt;
&lt;/head&gt;
&lt;body&gt;
  &lt;h1&gt;Titre&lt;/h1&gt;
  &lt;p&gt;Un paragraphe.&lt;/p&gt;
&lt;/body&gt;
&lt;/html&gt;</code></pre>
<h3>Les balises indispensables au WebGIS</h3>
<ul>
<li><code>&lt;div id="map"&gt;</code> — le conteneur de ta carte Leaflet.</li>
<li><code>&lt;input&gt;</code>, <code>&lt;select&gt;</code>, <code>&lt;button&gt;</code> — formulaires de recherche et filtres.</li>
<li><code>&lt;script src="..."&gt;</code> et <code>&lt;link rel="stylesheet"&gt;</code> — charger Leaflet (JS + CSS).</li>
</ul>
<h3>Sélecteurs CSS essentiels</h3>
<pre><code>p        { color: blue; }      /* toutes les balises p */
.classe  { font-weight: bold; } /* class="classe" */
#map     { height: 400px; }    /* id="map" — LA règle vitale : sans hauteur, pas de carte ! */</code></pre>
<div class="warn">⚠️ Erreur n°1 des débutants Leaflet : oublier de donner une <b>hauteur</b> à <code>#map</code>. La carte existe mais mesure 0 pixel.</div>
<h3>À toi de jouer</h3>
<p>Modifie le code ci-dessous puis clique <b>Exécuter</b> : change le titre, la couleur, ajoute un paragraphe. C'est en cassant qu'on apprend.</p>
`},
{t:'code',mode:'web',starter:`<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<style>
  body { font-family: sans-serif; margin: 20px; }
  h1 { color: #0369a1; }
  .encadre { border: 2px solid #0369a1; padding: 10px; border-radius: 8px; }
  #special { background: #fef9c3; }
</style>
</head>
<body>
  <h1>Mon premier WebGIS (bientôt)</h1>
  <p class="encadre">Je suis un paragraphe avec la classe "encadre".</p>
  <p id="special">Je suis le paragraphe #special.</p>
  <button>Un bouton qui ne fait rien... pour l'instant</button>
</body>
</html>`},
{t:'quiz',qs:[
{q:"Quel sélecteur CSS cible l'élément avec id=«map» ?",opts:["map",".map","#map","*map"],a:2,exp:"# pour un id, . pour une classe."},
{q:"Pourquoi #map doit-il avoir une hauteur CSS ?",opts:["Pour le SEO","Sans hauteur la carte Leaflet ne s'affiche pas","C'est obligatoire en HTML5","Pour charger plus vite"],a:1,exp:"Une div vide a une hauteur de 0 px : la carte serait invisible."},
{q:"Quelle balise charge une bibliothèque JavaScript externe ?",opts:["<link>","<import>","<script src=...>","<js>"],a:2,exp:"<script src=...> charge un fichier JS ; <link> sert au CSS."}
]},
{t:'tp',titre:"TP 1 — Ta page portfolio SIG",steps:[
"Dans l'éditeur ci-dessus, crée une page avec un titre <h1> à ton nom",
"Ajoute une liste <ul> de 3 compétences que tu vas acquérir (Leaflet, PostGIS, Node.js)",
"Ajoute une div <div id=«carte»> avec en CSS : height:200px et background:#dbeafe (elle accueillera ta carte au module 3)",
"Style le tout : une police, des couleurs, des marges",
"Bonus : recrée cette page dans VS Code sur ton ordinateur et ouvre-la avec l'extension Live Server"
]}
]);

/* ---------- MODULE 2 : JavaScript & GeoJSON ---------- */
const M2 = mod("2 · JavaScript & GeoJSON");
lec(M2,"m2l1","Variables, conditions, tableaux",[
{t:'html',c:`
<p>JavaScript est le langage qui rend la page vivante — et c'est aussi le langage de ton futur backend Node.js. Double rentabilité.</p>
<h3>Variables et types</h3>
<pre><code>let ville = "Douala";        // chaîne de caractères
const population = 3800000;  // nombre (const = non réassignable)
let actif = true;            // booléen
let coords = [9.70, 4.05];   // tableau [longitude, latitude]
let commune = { nom: "Douala", pop: 3800000 }; // objet</code></pre>
<h3>Conditions et boucles</h3>
<pre><code>if (population > 1000000) {
  console.log(ville + " est une métropole");
} else {
  console.log(ville + " est une ville moyenne");
}

for (let i = 0; i < coords.length; i++) {
  console.log(coords[i]);
}</code></pre>
<h3>Les méthodes de tableau : tes meilleurs alliés SIG</h3>
<pre><code>const pops = [3800000, 250000, 90000];
pops.filter(p => p > 100000)   // garde les valeurs > 100000
pops.map(p => p / 1000)        // transforme chaque valeur
pops.length                    // nombre d'éléments</code></pre>
<p>Filtrer des communes, transformer des coordonnées, compter des objets : 80 % du travail SIG côté client, c'est <code>filter</code> et <code>map</code>.</p>
<h3>Teste dans la console ci-dessous</h3>
<p>Le résultat de chaque <code>console.log</code> s'affiche sous l'éditeur.</p>
`},
{t:'code',mode:'js',starter:`const villes = [
  { nom: "Douala",   pop: 3800000 },
  { nom: "Yaoundé",  pop: 4100000 },
  { nom: "Kribi",    pop: 90000 },
  { nom: "Bafoussam", pop: 400000 }
];

// Les métropoles (> 1 million)
const metropoles = villes.filter(v => v.pop > 1000000);
console.log("Métropoles :", metropoles.map(v => v.nom));

// Population totale
let total = 0;
for (const v of villes) { total = total + v.pop; }
console.log("Population totale :", total);`},
{t:'challenge',desc:"Écris une fonction <code>grandesVilles(liste, seuil)</code> qui reçoit un tableau d'objets {nom, pop} et renvoie <b>le tableau des noms</b> (chaînes) des villes dont la population dépasse le seuil.",
starter:`function grandesVilles(liste, seuil) {
  // à toi de jouer : filter puis map
  return [];
}`,
tests:[
{name:"grandesVilles renvoie les bons noms",code:`JSON.stringify(grandesVilles([{nom:"A",pop:500},{nom:"B",pop:1500},{nom:"C",pop:2000}],1000))===JSON.stringify(["B","C"])`},
{name:"seuil non atteint → tableau vide",code:`JSON.stringify(grandesVilles([{nom:"A",pop:10}],1000))===JSON.stringify([])`},
{name:"renvoie des chaînes, pas des objets",code:`typeof grandesVilles([{nom:"X",pop:99999}],1)[0]==="string"`}
]}
]);
lec(M2,"m2l2","GeoJSON et API REST",[
{t:'html',c:`
<p><b>GeoJSON</b> est LE format d'échange des données géographiques sur le web. C'est du JSON avec une structure imposée. Tu vas le croiser partout : sorties PostGIS, réponses WFS, couches Leaflet.</p>
<h3>Anatomie d'un GeoJSON</h3>
<pre><code>{
  "type": "FeatureCollection",
  "features": [
    {
      "type": "Feature",
      "geometry": { "type": "Point", "coordinates": [9.70, 4.05] },
      "properties": { "nom": "Douala", "pop": 3800000 }
    }
  ]
}</code></pre>
<ul>
<li><b>geometry</b> — la forme : <code>Point</code>, <code>LineString</code>, <code>Polygon</code>…</li>
<li><b>properties</b> — les attributs métier (nom, population…).</li>
<li><b>coordinates</b> — ⚠️ toujours <b>[longitude, latitude]</b> en GeoJSON (Leaflet, lui, utilise [lat, lng] — piège classique !).</li>
</ul>
<h3>Consommer une API REST avec fetch</h3>
<p>Une <b>API REST</b> expose des données via des URLs. On les récupère avec <code>fetch()</code> :</p>
<pre><code>fetch("https://api-adresse.data.gouv.fr/search/?q=lyon")
  .then(reponse => reponse.json())
  .then(donnees => {
    console.log(donnees.features[0].properties.label);
  });</code></pre>
<div class="note">💡 L'API Adresse française renvoie directement du GeoJSON. Essaie ci-dessous avec une vraie requête réseau !</div>
`},
{t:'code',mode:'js',starter:`// Vraie requête vers l'API Adresse (data.gouv.fr)
fetch("https://api-adresse.data.gouv.fr/search/?q=marseille&limit=3")
  .then(r => r.json())
  .then(geojson => {
    console.log("Type :", geojson.type);
    console.log("Nombre de résultats :", geojson.features.length);
    for (const f of geojson.features) {
      console.log(f.properties.label, "->", f.geometry.coordinates);
    }
  })
  .catch(err => console.log("Erreur réseau :", err.message));`},
{t:'challenge',desc:"Écris une fonction <code>extrairePoints(geojson)</code> qui reçoit une FeatureCollection et renvoie un tableau d'objets <code>{nom, lat, lng}</code> — attention : dans GeoJSON, coordinates = [lng, lat], donc il faut <b>inverser</b> ! (le nom est dans <code>properties.nom</code>)",
starter:`function extrairePoints(geojson) {
  return geojson.features.map(f => {
    // récupère properties.nom et inverse les coordonnées
    return { nom: "", lat: 0, lng: 0 };
  });
}`,
tests:[
{name:"extrait le nom depuis properties",code:`extrairePoints({type:"FeatureCollection",features:[{type:"Feature",geometry:{type:"Point",coordinates:[9.7,4.05]},properties:{nom:"Douala"}}]})[0].nom==="Douala"`},
{name:"lat = coordinates[1]",code:`extrairePoints({type:"FeatureCollection",features:[{type:"Feature",geometry:{type:"Point",coordinates:[9.7,4.05]},properties:{nom:"D"}}]})[0].lat===4.05`},
{name:"lng = coordinates[0]",code:`extrairePoints({type:"FeatureCollection",features:[{type:"Feature",geometry:{type:"Point",coordinates:[9.7,4.05]},properties:{nom:"D"}}]})[0].lng===9.7`}
]},
{t:'tp',titre:"TP 2 — Mini géocodeur console",steps:[
"Dans le playground fetch ci-dessus, remplace 'marseille' par ta ville",
"Affiche uniquement le premier résultat : label + coordonnées",
"Crée une variable meilleurScore qui garde le résultat avec le score le plus élevé (propriété properties.score)",
"Sur geojson.io, dessine 3 points chez toi, copie le GeoJSON généré et fais-le afficher par ton code"
]}
]);

/* ---------- MODULE 3 : Leaflet ---------- */
const M3 = mod("3 · Leaflet");
lec(M3,"m3l1","Ta première carte interactive",[
{t:'html',c:`
<p><b>Leaflet</b> est une bibliothèque JavaScript open source (~42 Ko) pour créer des cartes interactives. C'est une <i>bibliothèque</i>, pas un <i>framework</i> : tu appelles ses fonctions quand tu veux, elle n'impose pas de structure.</p>
<h3>Les 3 lignes fondatrices</h3>
<pre><code>// 1. créer la carte dans la div #map, centrée [lat, lng] au zoom 13
const map = L.map('map').setView([4.05, 9.70], 13);

// 2. ajouter un fond de carte (les "tuiles" OpenStreetMap)
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap'
}).addTo(map);

// 3. ajouter un marqueur avec une popup
L.marker([4.05, 9.70]).addTo(map).bindPopup("Douala !");</code></pre>
<div class="warn">⚠️ Leaflet utilise <b>[latitude, longitude]</b> — l'inverse de GeoJSON. Retiens : <i>Leaflet = Lat d'abord</i>.</div>
<h3>Les objets de base</h3>
<ul>
<li><code>L.map(id)</code> — la carte ; <code>setView(centre, zoom)</code> la positionne.</li>
<li><code>L.tileLayer(url)</code> — le fond de carte (OSM, satellite…).</li>
<li><code>L.marker([lat,lng])</code> — un marqueur ; <code>.bindPopup(html)</code> lui attache une bulle.</li>

</ul>
<h3>Une vraie carte, là, maintenant</h3>

`},

lec(M3,"m3l2","Afficher du GeoJSON et styliser",[
{t:'html',c:`
<p>La vraie puissance : afficher des <b>données réelles</b>. Leaflet a un objet dédié : <code>L.geoJSON()</code>.</p>
<h3>Charger une FeatureCollection</h3>
<pre><code>L.geoJSON(mesDonnees, {
  style: { color: "#0369a1", weight: 2 },          // style des lignes/polygones
  onEachFeature: (feature, layer) => {              // pour chaque objet...
    layer.bindPopup(feature.properties.nom);        // ...popup avec l'attribut
  },
  pointToLayer: (feature, latlng) =>                // points -> cercles stylés
    L.circleMarker(latlng, { radius: 8, fillColor: "orange", fillOpacity: 0.8 })
}).addTo(map);</code></pre>
<ul>
<li><code>style</code> — apparence des géométries (fonction possible pour un style par attribut = carte choroplèthe).</li>
<li><code>onEachFeature</code> — exécuté pour chaque objet : popups, événements…</li>
<li><code>pointToLayer</code> — comment dessiner les points (cercles plutôt que marqueurs).</li>
</ul>
<p>Et pour des données distantes : <code>fetch(url).then(r=>r.json()).then(data => L.geoJSON(data).addTo(map))</code> — tu combines les modules 2 et 3 !</p>
<h3>Démo complète : villes + frontière fictive</h3>
`},
{t:'code',mode:'leaflet',starter:`const map = L.map('map').setView([5.5, 11.5], 6);

const villes = {
  "type": "FeatureCollection",
  "features": [
    { "type":"Feature", "geometry":{"type":"Point","coordinates":[9.70,4.05]},
      "properties":{"nom":"Douala","pop":3800000} },
    { "type":"Feature", "geometry":{"type":"Point","coordinates":[11.52,3.87]},
      "properties":{"nom":"Yaoundé","pop":4100000} },
    { "type":"Feature", "geometry":{"type":"Point","coordinates":[9.91,2.94]},
      "properties":{"nom":"Kribi","pop":90000} }

};

L.geoJSON(villes, {

                    f.properties.pop.toLocaleString() + " hab.")
}).addTo(map);`},

lec(M4,"m4l2","PostGIS : le SQL devient spatial",[
{t:'html',c:`
<p><b>PostGIS</b> ajoute un type de colonne <code>geometry</code> et plus de 500 fonctions spatiales <code>ST_*</code>. Ta table devient une carte interrogeable.</p>
<h3>Créer et remplir une table spatiale</h3>
<pre><code>CREATE TABLE lieux (
  id SERIAL PRIMARY KEY,
  nom TEXT,
  geom GEOMETRY(Point, 4326)   -- 4326 = WGS84, le système GPS
);

INSERT INTO lieux (nom, geom)
VALUES ('Douala', ST_SetSRID(ST_MakePoint(9.70, 4.05), 4326));</code></pre>
<h3>Les fonctions ST_* incontournables</h3>
<ul>
<li><code>ST_AsGeoJSON(geom)</code> — exporte en GeoJSON ⭐ (le pont vers Leaflet !)</li>
<li><code>ST_Distance(a, b)</code> — distance entre deux géométries</li>
<li><code>ST_DWithin(a, b, d)</code> — vrai si a est à moins de d de b (rayon de recherche)</li>
<li><code>ST_Within(a, b)</code> — vrai si a est contenu dans b (point dans polygone)</li>
<li><code>ST_Buffer(geom, d)</code> — zone tampon de d autour d'une géométrie</li>
<li><code>ST_Intersects(a, b)</code> — vrai si a et b se touchent/croisent</li>
</ul>
<h3>La requête d'or du WebGIS</h3>
<pre><code>-- "les écoles à moins de 2 km du point cliqué par l'utilisateur"
SELECT nom, ST_AsGeoJSON(geom)
FROM ecoles
WHERE ST_DWithin(
  geom::geography,
  ST_SetSRID(ST_MakePoint(9.70, 4.05), 4326)::geography,
  2000
);</code></pre>
<div class="note">💡 <code>::geography</code> fait calculer les distances en <b>mètres</b> réels plutôt qu'en degrés.</div>
`},

lec(M5,"m5l1","Construire une API GeoJSON",[
{t:'html',c:`
<p><b>Node.js</b> exécute du JavaScript hors navigateur : parfait pour écrire le serveur. <b>Express</b> est le framework minimaliste qui structure ton API. <b>node-postgres (pg)</b> connecte le tout à PostGIS.</p>
<h3>Un serveur Express en 8 lignes</h3>
<pre><code>const express = require('express');
const app = express();

app.get('/api/bonjour', (req, res) => {
  res.json({ message: "Bonjour le monde !" });
});

app.listen(3000, () => console.log("Serveur sur http://localhost:3000"));</code></pre>
<h3>La route qui sert du GeoJSON depuis PostGIS</h3>
<pre><code>const { Pool } = require('pg');
const pool = new Pool({ database: 'webgis', user: 'postgres', password: '...' });

app.get('/api/lieux', async (req, res) => {
  const sql = \`
    SELECT json_build_object(
      'type', 'FeatureCollection',
      'features', json_agg(json_build_object(
        'type', 'Feature',
        'geometry', ST_AsGeoJSON(geom)::json,
        'properties', json_build_object('nom', nom)
      ))
    ) AS geojson
    FROM lieux\`;
  const result = await pool.query(sql);
  res.json(result.rows[0].geojson);
});</code></pre>
<p>Côté frontend, il ne reste qu'à faire :</p>
<pre><code>fetch('/api/lieux').then(r => r.json())
  .then(data => L.geoJSON(data).addTo(map));</code></pre>
<div class="note">💡 La boucle est bouclée : <b>PostGIS → Express → fetch → Leaflet</b>. C'est ça, le full stack SIG.</div>
<h3>Concepts clés d'Express</h3>
<ul>
<li><b>Route</b> — <code>app.get('/chemin', handler)</code> : une URL = une fonction.</li>
<li><b>req</b> — la requête entrante : <code>req.params.id</code>, <code>req.query.rayon</code>.</li>
<li><b>res</b> — la réponse : <code>res.json(objet)</code> envoie du JSON.</li>
<li><b>Middleware</b> — fonctions exécutées avant les routes : <code>app.use(express.static('public'))</code> sert tes fichiers HTML/JS.</li>
</ul>
`},

lec(M6,"m6l1","Publier des services WMS/WFS",[
{t:'html',c:`
<p><b>GeoServer</b> évite de réécrire une API pour chaque couche : tu branches ta base PostGIS, il publie automatiquement des services standards <b>WMS</b> et <b>WFS</b> consommables par Leaflet, QGIS, ou n'importe quel client OGC.</p>
<h3>L'organisation en 3 niveaux</h3>
<ol>
<li><b>Espace de travail</b> (workspace) — un espace de noms, ex. <code>monprojet</code>.</li>
<li><b>Entrepôt</b> (store) — la connexion à une source : ta base PostGIS, un shapefile…</li>
<li><b>Couche</b> (layer) — une table publiée, avec son style et sa projection.</li>
</ol>
<h3>Consommer le WMS dans Leaflet</h3>
<pre><code>L.tileLayer.wms("http://localhost:8080/geoserver/monprojet/wms", {
  layers: "monprojet:communes",
  format: "image/png",
  transparent: true
}).addTo(map);</code></pre>
<h3>Consommer le WFS (GeoJSON) dans Leaflet</h3>
<pre><code>const url = "http://localhost:8080/geoserver/monprojet/ows" +
  "?service=WFS&version=2.0.0&request=GetFeature" +
  "&typeName=monprojet:communes&outputFormat=application/json";

fetch(url).then(r => r.json())
  .then(data => L.geoJSON(data).addTo(map));</code></pre>
<h3>Les styles SLD</h3>
<p>GeoServer dessine les couches WMS selon un style <b>SLD</b> (XML). Tu peux styliser par attribut (choroplèthe serveur), définir des règles par échelle, etc. L'éditeur intégré permet de tester en direct.</p>
<div class="warn">⚠️ En local, GeoServer tourne sur le port <b>8080</b> et l'interface d'admin est sur <code>http://localhost:8080/geoserver</code> (admin / geoserver par défaut — change ce mot de passe !).</div>
`},

}

let current = location.hash ? location.hash.slice(1) : allLessons[0].id;
if(!allLessons.find(l=>l.id===current)) current = allLessons[0].id;

function open_(id){
  current = id; location.hash = id;
  renderSide(); renderLesson();
  document.querySelector('.content').scrollIntoView({behavior:'smooth'});
  window.scrollTo({top:0});
}

let uid = 0;
function renderLesson(){
  const l = allLessons.find(x=>x.id===current);
  const idx = allLessons.indexOf(l);
  const el = document.getElementById('content');
  uid = 0;
  let h = `<div class="crumb">${l.modTitre}</div><h2>${l.titre}</h2>`;
  l.sections.forEach(sec=>{ h += renderSection(sec, l.id); });
  const isDone = S['done_'+l.id];
  h += `<div class="lesson-nav">
    <button class="btn-done ${isDone?'is-done':''}" onclick="toggleDone('${l.id}')">${isDone?'✓ Leçon terminée':'Marquer comme terminée'}</button>
    ${idx<allLessons.length-1?`<button class="btn-next" onclick="open_('${allLessons[idx+1].id}')">Leçon suivante →</button>`:''}
  </div>`;
  el.innerHTML = h;
}

function toggleDone(id){
  if(S['done_'+id]) delete S['done_'+id]; else S['done_'+id]=true;
  save(); renderSide(); renderLesson();
}

function esc_(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderSection(sec, lid){
  uid++;
  const id = lid+'_s'+uid;
  if(sec.t==='html') return `<div>${sec.c}</div>`;
  if(sec.t==='code'){
    const label = sec.mode==='leaflet'?'Playground Leaflet (carte réelle)':sec.mode==='js'?'Playground JavaScript (console)':'Playground HTML/CSS';
    return `<div class="pg" id="pg_${id}">
      <div class="pg-head">🧪 ${label}
        <button class="rst" onclick="pgReset('${id}')">↺ Réinitialiser</button>
        <button onclick="pgRun('${id}','${sec.mode}')">▶ Exécuter</button></div>
      <textarea id="ta_${id}" data-starter="${esc_(sec.starter).replace(/"/g,'&quot;')}">${esc_(sec.starter)}</textarea>
      ${sec.mode==='js'?`<div class="out" id="out_${id}">— la sortie console apparaîtra ici —</div>`:`<iframe id="if_${id}" sandbox="allow-scripts allow-popups"></iframe>`}
    </div>`;
  }
  if(sec.t==='quiz'){
    let h = `<div class="quiz" id="qz_${id}"><h4>📝 Quiz — vérifie tes acquis</h4>`;
    sec.qs.forEach((q,qi)=>{
      h += `<div class="q"><p>${qi+1}. ${esc_(q.q)}</p>`;
      q.opts.forEach((o,oi)=>{
        h += `<label><input type="radio" name="q_${id}_${qi}" value="${oi}"> ${esc_(o)}</label>`;
      });
      h += `<div class="exp" id="exp_${id}_${qi}">💡 ${esc_(q.exp)}</div></div>`;
    });
    h += `<button onclick='quizCheck("${id}", ${JSON.stringify(sec.qs.map(q=>q.a))})'>Valider mes réponses</button>
          <div class="verdict" id="v_${id}"></div></div>`;
    return h;
  }
  if(sec.t==='challenge'){
    return `<div class="quiz"><h4>⚔️ Défi de code — validation automatique</h4>
      <p>${sec.desc}</p>
      <div class="pg"><div class="pg-head">💻 Ton code
        <button onclick='chRun("${id}", ${JSON.stringify(sec.tests)})'>▶ Lancer les tests</button></div>
      <textarea id="ch_${id}">${esc_(sec.starter)}</textarea></div>
      <div class="tests" id="t_${id}"></div></div>`;
  }
  if(sec.t==='sql'){
    return `<div class="quiz sqlbox"><h4>🗄️ Exercice SQL</h4><p>${sec.q}</p>
      <div class="pg"><div class="pg-head">SQL
        <button onclick='sqlCheck("${id}", ${JSON.stringify(sec.sols)})'>✔ Vérifier</button></div>
      <textarea id="sq_${id}" style="min-height:60px" placeholder="Écris ta requête ici..."></textarea></div>
      <div class="verdict" id="v_${id}"></div><div class="hint">Indice : <code>${esc_(sec.hint)}</code></div></div>`;
  }
  if(sec.t==='tp'){
    let h = `<div class="tp"><h4>🛠️ ${sec.titre||'Travaux pratiques'}</h4>`;
    sec.steps.forEach((s,si)=>{
      const k = 'tp_'+id+'_'+si;
      h += `<label><input type="checkbox" ${S[k]?'checked':''} onchange="tpToggle('${k}')"> ${esc_(s)}</label>`;
    });
    h += `</div>`;
    return h;
  }
  return '';
}

function tpToggle(k){ if(S[k]) delete S[k]; else S[k]=true; save(); }

/* ---- playgrounds ---- */
function pgReset(id){
  const ta = document.getElementById('ta_'+id);
  ta.value = ta.dataset.starter;
}
function pgRun(id, mode){
  const code = document.getElementById('ta_'+id).value;
  if(mode==='js'){
    const out = document.getElementById('out_'+id);
    out.textContent = '';
    const logs = [];
    const orig = console.log;
    console.log = (...a)=>{ logs.push(a.map(x=>typeof x==='object'?JSON.stringify(x):String(x)).join(' ')); orig(...a); render(); };
    function render(){ out.textContent = logs.join('\n') || '(aucune sortie)'; }
    try { (new Function(code))(); render(); }
    catch(e){ logs.push('❌ Erreur : '+e.message); render(); }
    setTimeout(()=>{ console.log = orig; }, 4000);
    return;
  }
  const iframe = document.getElementById('if_'+id);
  if(mode==='web'){ iframe.srcdoc = code; return; }
  if(mode==='leaflet'){
    iframe.srcdoc = `<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"><\/script>
<style>html,body,#map{height:100%;margin:0}</style></head>
<body><div id="map"></div><script>try{${code}}catch(e){document.body.innerHTML='<pre style="color:red;padding:10px">Erreur : '+e.message+'</pre>'}<\/script></body></html>`;
  }
}

/* ---- quiz ---- */
function quizCheck(id, answers){
  let ok = 0;
  answers.forEach((a,qi)=>{
    const sel = document.querySelector(`input[name="q_${id}_${qi}"]:checked`);
    const labels = document.querySelectorAll(`input[name="q_${id}_${qi}"]`);
    labels.forEach((inp,oi)=>{
      inp.parentElement.classList.remove('ok','ko');
      if(oi===a) inp.parentElement.classList.add('ok');
      else if(sel && inp===sel) inp.parentElement.classList.add('ko');
    });
    document.getElementById(`exp_${id}_${qi}`).style.display='block';
    if(sel && +sel.value===a) ok++;
  });
  const v = document.getElementById('v_'+id);
  const pct = Math.round(ok/answers.length*100);
  v.textContent = `Score : ${ok}/${answers.length} (${pct} %) ${pct===100?'— parfait ! 🎉':pct>=60?'— pas mal, relis les explications':'— relis la leçon puis réessaie'}`;
  v.className = 'verdict '+(pct>=60?'ok':'ko');
}

/* ---- challenge ---- */
function chRun(id, tests){
  const code = document.getElementById('ch_'+id).value;
  const box = document.getElementById('t_'+id);
  let h = ''; let allOk = true;
  tests.forEach(t=>{
    let pass=false, err='';
    try { pass = !!(new Function(code + '\n;return ('+t.code+');'))(); }
    catch(e){ err=e.message; }
    if(!pass) allOk=false;
    h += `<div class="${pass?'pass':'fail'}">${pass?'✅':'❌'} ${t.name}${err?' — '+err:''}</div>`;
  });
  if(allOk) h += `<div class="pass" style="font-weight:700">🏆 Tous les tests passent — défi réussi !</div>`;
  box.innerHTML = h;
}

/* ---- sql ---- */
function sqlCheck(id, sols){
  const raw = document.getElementById('sq_'+id).value;
  // normalisation : minuscules, suppression de TOUS les espaces et du ; final
  const norm = raw.toLowerCase().replace(/\s+/g,'').replace(/;+$/,'');
  const ok = sols.some(s=> new RegExp(s,'i').test(norm));
  const v = document.getElementById('v_'+id);
  v.textContent = ok ? '✅ Correct ! Requête valide.' : '❌ Pas encore — vérifie la syntaxe (l\'indice peut aider).';
  v.className = 'verdict '+(ok?'ok':'ko');
}

renderSide(); renderLesson();
window.addEventListener('hashchange',()=>{ const id=location.hash.slice(1); if(allLessons.find(l=>l.id===id)){ current=id; renderSide(); renderLesson(); }});
</script>
</body>
